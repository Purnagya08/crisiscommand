services:
  - type: web
    name: crisiscommand-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false   # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard — KEEP SECRET
